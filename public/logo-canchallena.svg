  <line x1="22" y1="12" x2="22" y2="36" stroke="#26a69a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="22" cy="24" r="5" fill="none" stroke="#26a69a" stroke-width="1.5" opacity="0.5"/>
  <text x="22" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#26a69a" text-anchor="middle">CL</text>
